server:
  address: ${SPRING_SERVER_ADDRESS}
  port: ${SPRING_SERVER_PORT}

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE}

  bootstrap:
    super-admin: true
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 15MB

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME}

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO}
    database-platform: ${SPRING_JPA_DATABASE_PLATFORM}

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    senderMail: ${MAIL_USERNAME}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  ai:
    ollama:
      # Ollama server ka address
      base-url: http://localhost:11434
      chat:
        options:
          model: tinyllama:latest
          # Optional Advanced Settings:
          # Temperature 0.0 (Strict/To-the-point) se 1.0 (Creative/Random) tak hota hai
          temperature: 0.7
jwt:
  secret-key: ${JWT_SECRET}
  refresh-token-expiration: 604800000    # 7 days
  token-expiration: 86400000             # 1 day
app:
    url: ${CLIENT_URL:http://localhost:5173}

file:
  upload-dir: C:\Users\LENOVO\Downloads\Spring_Projects

